  </text>
  <text x="140" y="342" fill="#475569" font-size="22" font-family="Inter, Arial, sans-serif">
    spreadsheet workflow.
  </text>

  <g font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#475569">

    <filter id="cardShadow" x="60" y="60" width="1080" height="510" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#radial1)" />
  <rect width="1200" height="630" fill="url(#radial2)" />

  <circle cx="120" cy="80" r="140" stroke="#E2E8F0" stroke-width="1" opacity="0.25" />
  <circle cx="1020" cy="140" r="120" stroke="#E2E8F0" stroke-width="1" opacity="0.25" />
  <circle cx="300" cy="540" r="90" stroke="#E2E8F0" stroke-width="1" opacity="0.25" />

  <rect x="80" y="80" width="1040" height="470" rx="36" fill="#FFFFFF" fill-opacity="0.92" stroke="#E2E8F0" filter="url(#cardShadow)" />

  <g transform="translate(140 150)">
    <rect width="56" height="56" rx="16" fill="#FFFFFF" stroke="#E2E8F0" />
    <g transform="translate(14 12)">
      <path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1Z" fill="#16A34A" />
      <path d="M16 8h-6a2 2 0 1 0 0 4h6" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M12 17.5v-11" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round" />
    </g>
  </g>

  <text x="220" y="188" fill="#64748B" font-size="12" font-family="Inter, Arial, sans-serif" letter-spacing="6">SPLITSIMPLE</text>

  <text x="140" y="260" fill="#0F172A" font-size="60" font-family="Inter, Arial, sans-serif" font-weight="700">Split bills in seconds.</text>
  <text x="140" y="310" fill="#475569" font-size="22" font-family="Inter, Arial, sans-serif">

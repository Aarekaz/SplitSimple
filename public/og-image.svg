<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#EEF2FF" />
    </linearGradient>
    <radialGradient id="radial1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1080 0) scale(900 450)">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.16" />
      <stop offset="60%" stop-color="#3B82F6" stop-opacity="0" />
